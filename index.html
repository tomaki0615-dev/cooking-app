<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>レシピ管理</title>

<!-- アイコン -->
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{font-family:-apple-system,sans-serif;margin:0;background:#f5f5f5;}
header{background:#ff7f50;color:#fff;padding:15px;text-align:center;font-size:18px;}
.container{padding:10px;}
button{padding:10px;border:none;border-radius:8px;background:#ff7f50;color:#fff;margin:5px 2px;}
input,textarea,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}
.card{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px;}
img{width:100%;border-radius:10px;margin-top:5px;}
.topbar{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:12px;background:#eee;padding:3px 6px;border-radius:5px;margin-right:3px;}
.count{font-weight:bold;}
.fav{font-size:20px;cursor:pointer;}
.active{color:gold;}
</style>
</head>

<body>

<header>🍳 レシピ管理（IndexedDB版）</header>

<div class="container">

<div class="topbar">
<button onclick="showAdd()">＋追加</button>
<input id="search" placeholder="検索..." oninput="render()">

<select id="sort" onchange="render()">
  <option value="new">新しい順</option>
  <option value="count">回数順</option>
  <option value="recent">最近作った順</option>
</select>
</div>

<div id="addForm" style="display:none;">
<input id="title" placeholder="レシピ名">
<input type="file" id="image" multiple>
<input id="tags" placeholder="タグ（例：時短,子どもウケ）">
<textarea id="memo" placeholder="メモ"></textarea>
<button onclick="addRecipe()">保存</button>
</div>

<div id="list"></div>

</div>

<script>
let db;

// DB初期化
const request = indexedDB.open("recipeDB", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("recipes", { keyPath: "id" });
};

request.onsuccess = e => {
  db = e.target.result;
  render();
};

// 追加フォーム表示
function showAdd(){
  document.getElementById("addForm").style.display="block";
}

// 追加
function addRecipe(){
  const files = document.getElementById("image").files;
  let imgs = [];
  let loaded = 0;

  if(files.length === 0){
    saveRecipe([]);
    return;
  }

  for(let i=0;i<files.length;i++){
    const reader = new FileReader();

    reader.onload = e=>{
      imgs.push(e.target.result);
      loaded++;
      if(loaded === files.length){
        saveRecipe(imgs);
      }
    };

    reader.readAsDataURL(files[i]);
  }
}

function saveRecipe(imgs){
  const tx = db.transaction("recipes","readwrite");
  const store = tx.objectStore("recipes");

  store.add({
    id:Date.now(),
    title:document.getElementById("title").value,
    imgs:imgs,
    tags:document.getElementById("tags").value.split(","),
    memo:document.getElementById("memo").value,
    count:0,
    last:"",
    fav:false
  });

  tx.oncomplete = render;
}

// 取得して描画
function render(){
  const tx = db.transaction("recipes","readonly");
  const store = tx.objectStore("recipes");
  const req = store.getAll();

  req.onsuccess = ()=>{
    let recipes = req.result;

    const q = document.getElementById("search").value.toLowerCase();
    const sort = document.getElementById("sort").value;

    recipes = recipes.filter(r=>r.title.toLowerCase().includes(q));

    if(sort==="count"){
      recipes.sort((a,b)=>b.count - a.count);
    }else if(sort==="recent"){
      recipes.sort((a,b)=>(b.last||"").localeCompare(a.last||""));
    }else{
      recipes.sort((a,b)=>b.id - a.id);
    }

    recipes.sort((a,b)=>b.fav - a.fav);

    const list = document.getElementById("list");
    list.innerHTML="";

    recipes.forEach(r=>{
      const div = document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <div style="display:flex;justify-content:space-between;">
          <h3>${r.title}</h3>
          <span class="fav ${r.fav?"active":""}" onclick="toggleFav(${r.id})">★</span>
        </div>

        ${r.imgs.map(img=>`<img src="${img}">`).join("")}

        <div>${r.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>

        <p>${r.memo}</p>

        <p class="count">
          🍳 ${r.count}回 / 最終: ${r.last ? new Date(r.last).toLocaleDateString() : "-"}
        </p>

        <button onclick="cook(${r.id})">作った！</button>
        <button onclick="del(${r.id})">削除</button>
      `;

      list.appendChild(div);
    });
  };
}

// 更新系
function cook(id){
  const tx = db.transaction("recipes","readwrite");
  const store = tx.objectStore("recipes");
  const req = store.get(id);

  req.onsuccess = ()=>{
    const r = req.result;
    r.count++;
    r.last = new Date().toISOString();
    store.put(r);
    render();
  };
}

function toggleFav(id){
  const tx = db.transaction("recipes","readwrite");
  const store = tx.objectStore("recipes");
  const req = store.get(id);

  req.onsuccess = ()=>{
    const r = req.result;
    r.fav = !r.fav;
    store.put(r);
    render();
  };
}

function del(id){
  const tx = db.transaction("recipes","readwrite");
  const store = tx.objectStore("recipes");
  store.delete(id);
  tx.oncomplete = render;
}
</script>

</body>
</html>
