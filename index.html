<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>レシピ管理</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="レシピ管理">

<style>
body{font-family:-apple-system,sans-serif;margin:0;background:#f5f5f5;}
header{background:#ff7f50;color:#fff;padding:12px;text-align:center;font-size:16px;}
.container{padding:10px;}

button{padding:8px;border:none;border-radius:8px;background:#ff7f50;color:#fff;margin:4px 2px;font-size:14px;}
button:disabled{background:#ccc;}

input,textarea,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.topbar{display:flex;gap:5px;flex-wrap:wrap;}

/* カード小型化 */
.card{
  background:#fff;
  padding:8px;
  border-radius:10px;
  margin-bottom:8px;
  font-size:14px;
}

/* タイトル行 */
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.fav{font-size:18px;cursor:pointer;}
.active{color:gold;}

.tag{
  font-size:11px;
  background:#eee;
  padding:2px 5px;
  border-radius:5px;
  margin-right:3px;
}

/* 👇 ギャラリー */
.gallery{
  display:flex;
  overflow-x:auto;
  gap:6px;
  margin:5px 0;
}

.thumb{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:8px;
  flex-shrink:0;
}

/* 情報コンパクト */
.count{font-size:12px;font-weight:bold;color:#555;}

</style>
</head>

<body>

<header>🍳 レシピ管理（軽量UI）</header>

<div class="container">

<div class="topbar">
<button id="addBtn" onclick="showAdd()" disabled>＋追加</button>
<input id="search" placeholder="検索..." oninput="render()">

<select id="sort" onchange="render()">
  <option value="new">新しい順</option>
  <option value="count">回数順</option>
  <option value="recent">最近作った順</option>
</select>
</div>

<div id="addForm" style="display:none;">
<input id="title" placeholder="レシピ名（必須）">
<input type="file" id="image" multiple>
<input id="tags" placeholder="タグ（例：時短,子どもウケ）">
<textarea id="memo" placeholder="メモ"></textarea>
<button onclick="addRecipe()">保存</button>
</div>

<div id="list"></div>

</div>

<script>
let db;
let dbReady = false;

// ===== DB =====
const request = indexedDB.open("recipeDB", 1);

request.onupgradeneeded = e=>{
  db = e.target.result;
  db.createObjectStore("recipes",{keyPath:"id"});
};

request.onsuccess = e=>{
  db = e.target.result;
  dbReady = true;
  document.getElementById("addBtn").disabled=false;
  render();
};

// ===== UI =====
function showAdd(){
  document.getElementById("addForm").style.display="block";
}

// ===== 追加 =====
function addRecipe(){
  if(!dbReady){ alert("準備中"); return; }

  const title = document.getElementById("title").value.trim();
  if(!title){ alert("名前入れて"); return; }

  const files = document.getElementById("image").files;

  if(files.length===0){
    saveRecipe([]);
    return;
  }

  const promises = Array.from(files).map(file=>{
    return new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result);
      reader.onerror=rej;
      reader.readAsDataURL(file);
    });
  });

  Promise.all(promises).then(imgs=>saveRecipe(imgs));
}

function saveRecipe(imgs){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");

  store.add({
    id:Date.now(),
    title:document.getElementById("title").value,
    imgs:imgs,
    tags:document.getElementById("tags").value.split(",").filter(t=>t),
    memo:document.getElementById("memo").value,
    count:0,
    last:"",
    fav:false
  });

  tx.oncomplete=()=>{
    document.getElementById("addForm").style.display="none";
    clearForm();
    render();
  };
}

function clearForm(){
  title.value="";
  image.value="";
  tags.value="";
  memo.value="";
}

// ===== 描画 =====
function render(){
  if(!dbReady)return;

  const tx=db.transaction("recipes","readonly");
  const store=tx.objectStore("recipes");
  const req=store.getAll();

  req.onsuccess=()=>{
    let recipes=req.result;

    const q=search.value.toLowerCase();
    const sort=document.getElementById("sort").value;

    recipes=recipes.filter(r=>(r.title||"").toLowerCase().includes(q));

    if(sort==="count"){
      recipes.sort((a,b)=>b.count-a.count);
    }else if(sort==="recent"){
      recipes.sort((a,b)=>(b.last||"").localeCompare(a.last||""));
    }else{
      recipes.sort((a,b)=>b.id-a.id);
    }

    recipes.sort((a,b)=>b.fav-a.fav);

    list.innerHTML="";

    recipes.forEach(r=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <div class="card-header">
          <strong>${r.title}</strong>
          <span class="fav ${r.fav?"active":""}" onclick="toggleFav(${r.id})">★</span>
        </div>

        <div class="gallery">
          ${r.imgs.map(img=>`<img src="${img}" class="thumb">`).join("")}
        </div>

        <div>
          ${r.tags.map(t=>`<span class="tag">${t}</span>`).join("")}
        </div>

        <div class="count">
          🍳${r.count}回 / ${r.last?new Date(r.last).toLocaleDateString():"-"}
        </div>

        <button onclick="cook(${r.id})">作った</button>
        <button onclick="del(${r.id})">削除</button>
      `;

      list.appendChild(div);
    });
  };
}

// ===== 操作 =====
function cook(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const req=store.get(id);

  req.onsuccess=()=>{
    const r=req.result;
    r.count++;
    r.last=new Date().toISOString();
    store.put(r);
    render();
  };
}

function toggleFav(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const req=store.get(id);

  req.onsuccess=()=>{
    const r=req.result;
    r.fav=!r.fav;
    store.put(r);
    render();
  };
}

function del(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  store.delete(id);
  tx.oncomplete=render;
}
</script>

</body>
</html>
