<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>レシピ管理</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="レシピ管理">

<style>
body{font-family:-apple-system;margin:0;background:#f5f5f5;}
header{background:#ff7f50;color:#fff;padding:12px;text-align:center;}
.container{padding:10px;}

button{padding:8px;border:none;border-radius:8px;background:#ff7f50;color:#fff;margin:4px;}
input,textarea,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}

.card{background:#fff;padding:8px;border-radius:10px;margin-bottom:8px;font-size:14px;}
.card-header{display:flex;justify-content:space-between;}
.fav{cursor:pointer;font-size:18px;}
.active{color:gold;}

.tag{font-size:11px;background:#eee;padding:2px 5px;border-radius:5px;margin-right:3px;}

.gallery{display:flex;overflow-x:auto;gap:6px;}
.thumb{width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;}

.count{font-size:12px;color:#555;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}
.modal img{max-width:90%;max-height:80%;}
</style>
</head>

<body>

<header>🍳 レシピ管理（完全版）</header>

<div class="container">

<button onclick="showAdd()">＋追加</button>
<input id="search" placeholder="検索..." oninput="render()">

<select id="sort" onchange="render()">
<option value="new">新しい順</option>
<option value="count">回数順</option>
<option value="recent">最近作った順</option>
</select>

<div id="addForm" style="display:none;">
<input id="title" placeholder="レシピ名（必須）">
<input type="file" id="image" multiple>
<input id="tags" placeholder="タグ（カンマ区切り）">
<textarea id="memo" placeholder="メモ"></textarea>
<button onclick="addRecipe()">保存</button>
</div>

<div id="list"></div>

</div>

<div id="modal" class="modal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script>
let db, dbReady=false;

const req=indexedDB.open("recipeDB",1);

req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("recipes",{keyPath:"id"});
};

req.onsuccess=e=>{
  db=e.target.result;
  dbReady=true;
  render();
};

// ===== UI =====
function showAdd(){
  document.getElementById("addForm").style.display="block";
}

// ===== 追加 =====
function addRecipe(){
  if(!dbReady){ alert("準備中"); return; }

  const titleEl=document.getElementById("title");
  const title=titleEl.value.trim();
  if(!title){ alert("名前入れて"); return; }

  const files=document.getElementById("image").files;

  if(files.length===0){
    saveRecipe([]);
    return;
  }

  Promise.all([...files].map(f=>{
    return new Promise(res=>{
      const r=new FileReader();
      r.onload=e=>res(e.target.result);
      r.readAsDataURL(f);
    });
  })).then(imgs=>saveRecipe(imgs));
}

function saveRecipe(imgs){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");

  store.add({
    id:Date.now(),
    title:document.getElementById("title").value,
    imgs:imgs,
    tags:(document.getElementById("tags").value||"").split(",").filter(t=>t),
    memo:document.getElementById("memo").value,
    count:0,
    last:"",
    fav:false
  });

  tx.oncomplete=()=>{
    document.getElementById("addForm").style.display="none";
    document.getElementById("title").value="";
    document.getElementById("image").value="";
    document.getElementById("tags").value="";
    document.getElementById("memo").value="";
    render();
  };
}

// ===== 描画 =====
function render(){
  if(!dbReady)return;

  const tx=db.transaction("recipes","readonly");
  const store=tx.objectStore("recipes");
  const req=store.getAll();

  req.onsuccess=()=>{
    let data=req.result || [];

    const q=(document.getElementById("search").value||"").toLowerCase();
    const sortValue=document.getElementById("sort").value;

    data=data.filter(d=>(d.title||"").toLowerCase().includes(q));

    if(sortValue==="count"){
      data.sort((a,b)=>b.count-a.count);
    }else if(sortValue==="recent"){
      data.sort((a,b)=>(b.last||"").localeCompare(a.last||""));
    }else{
      data.sort((a,b)=>b.id-a.id);
    }

    data.sort((a,b)=>b.fav-a.fav);

    const list=document.getElementById("list");
    list.innerHTML="";

    data.forEach(d=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML = `
  <!-- 表示モード -->
  <div id="view-${d.id}">
    <h3>${d.title}</h3>

    <div class="gallery">
      ${d.imgs.map(img=>`<img src="${img}" class="thumb">`).join("")}
    </div>

    <div>
      ${(d.tags||"").split(",").map(t=>`<span class="tag">${t}</span>`).join("")}
    </div>

    <p>${d.memo||""}</p>

    <p>🍳${d.count}回</p>

    <button onclick="edit(${d.id})">編集</button>
    <button onclick="cook(${d.id})">作った</button>
    <button onclick="del(${d.id})">削除</button>
  </div>

  <!-- 編集モード -->
  <div id="edit-${d.id}" style="display:none;">
    <input id="e-title-${d.id}" value="${d.title}">
    <input id="e-tags-${d.id}" value="${d.tags||""}">
    <textarea id="e-memo-${d.id}">${d.memo||""}</textarea>

    <button onclick="saveEdit(${d.id})">保存</button>
    <button onclick="cancelEdit(${d.id})">キャンセル</button>
  </div>
`;
      

      list.appendChild(div);
    });
  };
}
function edit(id){
  document.getElementById("view-"+id).style.display="none";
  document.getElementById("edit-"+id).style.display="block";
}

function cancelEdit(id){
  document.getElementById("view-"+id).style.display="block";
  document.getElementById("edit-"+id).style.display="none";
}

function saveEdit(id){
  const tx = db.transaction("recipes","readwrite");
  const store = tx.objectStore("recipes");
  const req = store.get(id);

  req.onsuccess = ()=>{
    const d = req.result;
    d.title = document.getElementById("e-title-"+id).value;
    d.tags = document.getElementById("e-tags-"+id).value;
    d.memo = document.getElementById("e-memo-"+id).value;
    store.put(d);
    render();
  };
}
// ===== 更新 =====
function updateField(id,field,value){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const req=store.get(id);

  req.onsuccess=()=>{
    const d=req.result;
    if(!d)return;
    d[field]=value;
    store.put(d);
  };
}

function updateTags(id,text){
  updateField(id,"tags",text.split(",").map(t=>t.trim()).filter(t=>t));
}

// ===== 操作 =====
function cook(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const req=store.get(id);

  req.onsuccess=()=>{
    const d=req.result;
    if(!d)return;
    d.count++;
    d.last=new Date().toISOString();
    store.put(d);
    render();
  };
}

function toggleFav(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const req=store.get(id);

  req.onsuccess=()=>{
    const d=req.result;
    if(!d)return;
    d.fav=!d.fav;
    store.put(d);
    render();
  };
}

function del(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  store.delete(id);
  tx.oncomplete=render;
}

// ===== モーダル =====
function openModal(src){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=src;
}
</script>

</body>
</html>
