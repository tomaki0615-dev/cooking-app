<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>レシピ管理</title>

<style>
body{font-family:-apple-system;margin:0;background:#f5f5f5;}
header{background:#ff7f50;color:#fff;padding:12px;text-align:center;}
.container{padding:10px;}

button{padding:8px;border:none;border-radius:8px;background:#ff7f50;color:#fff;margin:4px;}
input,textarea{width:100%;padding:6px;margin:3px 0;border-radius:6px;border:1px solid #ccc;}

.card{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px;}
.thumb{width:80px;height:80px;object-fit:cover;border-radius:8px;}
.gallery{display:flex;gap:5px;overflow-x:auto;}
</style>
</head>

<body>

<header>🍳 レシピ管理（編集対応）</header>

<div class="container">

<button onclick="showAdd()">＋追加</button>

<div id="addForm" style="display:none;">
<input id="title" placeholder="レシピ名">
<input type="file" id="image" multiple>
<input id="tags" placeholder="タグ">
<textarea id="memo" placeholder="メモ"></textarea>
<button onclick="addRecipe()">保存</button>
</div>

<div id="list"></div>

</div>

<script>
let db;
const req=indexedDB.open("recipeDB",1);

req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("recipes",{keyPath:"id"});
};

req.onsuccess=e=>{
  db=e.target.result;
  render();
};

function showAdd(){
  addForm.style.display="block";
}

// ===== 追加 =====
function addRecipe(){
  const titleVal=title.value.trim();
  if(!titleVal){ alert("名前入れて"); return;}

  const files=image.files;

  if(files.length===0){
    saveRecipe([]);
    return;
  }

  Promise.all([...files].map(f=>{
    return new Promise(res=>{
      const r=new FileReader();
      r.onload=e=>res(e.target.result);
      r.readAsDataURL(f);
    });
  })).then(imgs=>saveRecipe(imgs));
}

function saveRecipe(imgs){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");

  store.add({
    id:Date.now(),
    title:title.value,
    imgs:imgs,
    tags:tags.value,
    memo:memo.value,
    count:0
  });

  tx.oncomplete=()=>{
    addForm.style.display="none";
    title.value=""; image.value=""; tags.value=""; memo.value="";
    render();
  };
}

// ===== 描画 =====
function render(){
  const tx=db.transaction("recipes","readonly");
  const store=tx.objectStore("recipes");
  const req=store.getAll();

  req.onsuccess=()=>{
    list.innerHTML="";

    req.result.forEach(d=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <input value="${d.title}" onchange="update(${d.id},'title',this.value)">
        
        <div class="gallery">
          ${d.imgs.map(img=>`<img src="${img}" class="thumb">`).join("")}
        </div>

        <input value="${d.tags||""}" onchange="update(${d.id},'tags',this.value)">
        
        <textarea onchange="update(${d.id},'memo',this.value)">${d.memo||""}</textarea>

        <p>🍳${d.count}回</p>

        <button onclick="cook(${d.id})">作った</button>
        <button onclick="del(${d.id})">削除</button>
      `;

      list.appendChild(div);
    });
  };
}

// ===== 更新 =====
function update(id,field,value){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const r=store.get(id);

  r.onsuccess=()=>{
    const d=r.result;
    d[field]=value;
    store.put(d);
  };
}

// ===== 操作 =====
function cook(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const r=store.get(id);

  r.onsuccess=()=>{
    const d=r.result;
    d.count++;
    store.put(d);
    render();
  };
}

function del(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  store.delete(id);
  tx.oncomplete=render;
}
</script>

</body>
</html>
