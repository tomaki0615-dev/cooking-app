<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>レシピ管理</title>

<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{font-family:-apple-system;margin:0;background:#f5f5f5;}
header{background:#222;color:#fff;padding:10px;text-align:center;}
.tab{display:flex;background:#eee;margin:10px;border-radius:10px;padding:3px;}
.tab button{flex:1;padding:10px;border:none;background:transparent;}
.tab button.active{background:#fff;border-radius:8px;}
.container{padding:10px;}
.card{background:#fff;margin-bottom:10px;padding:10px;border-radius:10px;}
.tag{background:#666;color:#fff;padding:4px 8px;margin:2px;border-radius:10px;font-size:12px;}
.tag-select{background:#eee;padding:4px 8px;margin:2px;border-radius:10px;cursor:pointer;}
.tag-select.active{background:#222;color:#fff;}
.thumb{width:60px;height:60px;object-fit:cover;border-radius:8px;}
</style>
</head>

<body>

<header>レシピ管理</header>

<div class="tab">
<button id="tabList" class="active" onclick="switchTab('list')">検索</button>
<button id="tabAdd" onclick="switchTab('add')">追加</button>
<button id="tabTag" onclick="switchTab('tag')">タグ管理</button>
</div>

<div class="container">

<div id="listTab">
<button onclick="toggleMode()">検索：<span id="mode">OR</span></button>
<div id="filterTags"></div>
<div id="list"></div>
</div>

<div id="addTab" style="display:none">
<input id="nameInput" placeholder="名前"><br><br>
<div id="addTags"></div>
<textarea id="memo"></textarea><br><br>
<input type="file" id="imageInput" multiple><br><br>
<button onclick="addItem()">追加</button>
</div>

<div id="tagTab" style="display:none">
<button onclick="addCategory()">＋カテゴリ追加</button>
<hr>
<div id="tagList"></div>
</div>

</div>

<script>
/* ===== DB ===== */
let db,data=[];
const req=indexedDB.open("recipeDB",1);

req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("recipes",{keyPath:"id"});
};

req.onsuccess=e=>{
  db=e.target.result;
  loadData();
};

function loadData(){
  db.transaction("recipes","readonly")
    .objectStore("recipes")
    .getAll().onsuccess=e=>{
      data=e.target.result||[];
      render();
    };
}

function saveItem(item){
  db.transaction("recipes","readwrite")
    .objectStore("recipes")
    .put(item);
}

function deleteItemDB(id){
  db.transaction("recipes","readwrite")
    .objectStore("recipes")
    .delete(id);
}

/* ===== カテゴリ（可変） ===== */
let tagCategories=JSON.parse(localStorage.getItem("tagCategories"))||[
  {name:"種類",tags:["主食","おかず"]},
  {name:"時間",tags:["朝","昼","夜"]},
  {name:"材料",tags:["肉","魚","野菜"]}
];

function saveTags(){
localStorage.setItem("tagCategories",JSON.stringify(tagCategories));
}

let selectedTags=[],addSelectedTags=[];
let mode="OR";

/* ===== タブ ===== */
function switchTab(tab){
listTab.style.display=tab==="list"?"block":"none";
addTab.style.display=tab==="add"?"block":"none";
tagTab.style.display=tab==="tag"?"block":"none";

tabList.classList.toggle("active",tab==="list");
tabAdd.classList.toggle("active",tab==="add");
tabTag.classList.toggle("active",tab==="tag");

renderTags();
render();
renderTagManager();
}

/* ===== タグ表示 ===== */
function renderTags(){
let html="",addHtml="";

tagCategories.forEach(cat=>{
html+=`<div><b>${cat.name}</b></div>`;
addHtml+=`<div><b>${cat.name}</b></div>`;

cat.tags.forEach(tag=>{
html+=`<span class="tag-select ${selectedTags.includes(tag)?"active":""}" onclick="toggleTag('${tag}')">${tag}</span>`;
addHtml+=`<span class="tag-select ${addSelectedTags.includes(tag)?"active":""}" onclick="toggleAddTag('${tag}')">${tag}</span>`;
});
});

filterTags.innerHTML=html;
addTags.innerHTML=addHtml;
}

function toggleTag(tag){
selectedTags=selectedTags.includes(tag)
?selectedTags.filter(t=>t!==tag)
:[...selectedTags,tag];
render();renderTags();
}

function toggleAddTag(tag){
addSelectedTags=addSelectedTags.includes(tag)
?addSelectedTags.filter(t=>t!==tag)
:[...addSelectedTags,tag];
renderTags();
}

/* ===== カテゴリ管理 ===== */
function renderTagManager(){
let html="";

tagCategories.forEach((cat,i)=>{
html+=`<h3>${cat.name}
<button onclick="renameCategory(${i})">編集</button>
<button onclick="deleteCategory(${i})">削除</button>
</h3>`;

cat.tags.forEach(tag=>{
html+=`${tag}
<button onclick="editTag(${i},'${tag}')">編集</button>
<button onclick="deleteTag(${i},'${tag}')">削除</button><br>`;
});

html+=`<button onclick="addTag(${i})">＋タグ追加</button><hr>`;
});

tagList.innerHTML=html;
}

function addCategory(){
let name=prompt("カテゴリ名");
if(!name)return;
tagCategories.push({name,tags:[]});
saveTags();renderTags();renderTagManager();
}

function renameCategory(i){
let n=prompt("カテゴリ名変更",tagCategories[i].name);
if(!n)return;
tagCategories[i].name=n;
saveTags();renderTags();renderTagManager();
}

function deleteCategory(i){
if(!confirm("削除する？"))return;
tagCategories.splice(i,1);
saveTags();renderTags();renderTagManager();
}

function addTag(i){
let name=prompt("タグ名");
if(!name)return;
tagCategories[i].tags.push(name);
saveTags();renderTags();renderTagManager();
}

function editTag(i,old){
let n=prompt("編集",old);
if(!n)return;
let arr=tagCategories[i].tags;
arr[arr.indexOf(old)]=n;
saveTags();renderTags();renderTagManager();
}

function deleteTag(i,tag){
if(!confirm("削除する？"))return;
tagCategories[i].tags=
tagCategories[i].tags.filter(t=>t!==tag);
saveTags();renderTags();renderTagManager();
}

/* ===== 画像 ===== */
function compressImage(file){
return new Promise(res=>{
let img=new Image();
let r=new FileReader();
r.onload=e=>img.src=e.target.result;
img.onload=()=>{
let c=document.createElement("canvas");
let s=Math.min(800/img.width,1);
c.width=img.width*s;
c.height=img.height*s;
c.getContext("2d").drawImage(img,0,0,c.width,c.height);
c.toBlob(blob=>res(blob),"image/jpeg",0.7);
};
r.readAsDataURL(file);
});
}

/* ===== 追加 ===== */
function addItem(){
let name=nameInput.value.trim();
if(!name)return;

let ps=[];
for(let f of imageInput.files) ps.push(compressImage(f));

Promise.all(ps).then(imgs=>{
let item={
id:Date.now(),
name,
tags:addSelectedTags,
memo:memo.value,
images:imgs
};

data.push(item);
saveItem(item);

nameInput.value="";
memo.value="";
imageInput.value="";
addSelectedTags=[];

switchTab("list");
});
}

/* ===== 表示 ===== */
function render(){
list.innerHTML="";

let filtered=data.filter(item=>{
if(selectedTags.length===0) return true;
return mode==="AND"
? selectedTags.every(t=>item.tags.includes(t))
: selectedTags.some(t=>item.tags.includes(t));
});

filtered.forEach(item=>{
list.innerHTML+=`
<div class="card">
<b>${item.name}</b>
<div>${item.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
<div>${item.memo||""}</div>
<div>
${(item.images||[]).map(img=>{
let url=URL.createObjectURL(img);
return `<img class="thumb" src="${url}">`;
}).join("")}
</div>
<button onclick="deleteItem(${item.id})">削除</button>
</div>`;
});
}

function deleteItem(id){
data=data.filter(d=>d.id!==id);
deleteItemDB(id);
render();
}

/* 初期 */
renderTags();
</script>

</body>
</html>
