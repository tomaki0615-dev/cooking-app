<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>レシピ管理</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="レシピ管理">

<style>
body{font-family:-apple-system;margin:0;background:#f5f5f5;}
header{background:#ff7f50;color:#fff;padding:12px;text-align:center;}
.container{padding:10px;}

button{padding:8px;border:none;border-radius:8px;background:#ff7f50;color:#fff;margin:4px;}
input,textarea,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc;}

.card{background:#fff;padding:8px;border-radius:10px;margin-bottom:8px;font-size:14px;}
.card-header{display:flex;justify-content:space-between;}
.fav{cursor:pointer;font-size:18px;}
.active{color:gold;}

.tag{font-size:11px;background:#eee;padding:2px 5px;border-radius:5px;margin-right:3px;}

.gallery{display:flex;overflow-x:auto;gap:6px;}
.thumb{width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;}

.count{font-size:12px;color:#555;}

/* モーダル */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}
.modal img{
  max-width:90%;
  max-height:80%;
  border-radius:10px;
}
.modal-close{
  position:absolute;
  top:20px;
  right:20px;
  font-size:24px;
  color:#fff;
  cursor:pointer;
}

/* 編集 */
.edit-area input, .edit-area textarea{
  font-size:14px;
}
</style>
</head>

<body>

<header>🍳 レシピ管理（進化版）</header>

<div class="container">

<button onclick="showAdd()">＋追加</button>
<input id="search" placeholder="検索..." oninput="render()">

<select id="sort" onchange="render()">
<option value="new">新しい順</option>
<option value="count">回数順</option>
<option value="recent">最近作った順</option>
</select>

<div id="addForm" style="display:none;">
<input id="title" placeholder="レシピ名">
<input type="file" id="image" multiple>
<input id="tags" placeholder="タグ（カンマ区切り）">
<textarea id="memo" placeholder="メモ"></textarea>
<button onclick="addRecipe()">保存</button>
</div>

<div id="list"></div>

</div>

<!-- モーダル -->
<div id="modal" class="modal" onclick="closeModal()">
<span class="modal-close">✕</span>
<img id="modalImg">
</div>

<script>
let db;
let dbReady=false;

const req=indexedDB.open("recipeDB",1);

req.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("recipes",{keyPath:"id"});
};

req.onsuccess=e=>{
  db=e.target.result;
  dbReady=true;
  render();
};

// ===== 追加 =====
function showAdd(){
  addForm.style.display="block";
}

function addRecipe(){
  if(!dbReady)return;

  const titleVal=title.value.trim();
  if(!titleVal){ alert("名前入れて"); return;}

  const files=image.files;

  if(files.length===0){
    saveRecipe([]);
    return;
  }

  Promise.all([...files].map(f=>{
    return new Promise(res=>{
      const r=new FileReader();
      r.onload=e=>res(e.target.result);
      r.readAsDataURL(f);
    });
  })).then(imgs=>saveRecipe(imgs));
}

function saveRecipe(imgs){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");

  store.add({
    id:Date.now(),
    title:title.value,
    imgs:imgs,
    tags:tags.value.split(",").filter(t=>t),
    memo:memo.value,
    count:0,
    last:"",
    fav:false
  });

  tx.oncomplete=()=>{
    addForm.style.display="none";
    title.value=""; image.value=""; tags.value=""; memo.value="";
    render();
  };
}

// ===== 描画 =====
function render(){
  if(!dbReady)return;

  const tx=db.transaction("recipes","readonly");
  const store=tx.objectStore("recipes");
  const r=store.getAll();

  r.onsuccess=()=>{
    let data=r.result;

    const q=search.value.toLowerCase();
    const sort=sort.value;

    data=data.filter(d=>(d.title||"").toLowerCase().includes(q));

    if(sort==="count") data.sort((a,b)=>b.count-a.count);
    else if(sort==="recent") data.sort((a,b)=>(b.last||"").localeCompare(a.last||""));
    else data.sort((a,b)=>b.id-a.id);

    data.sort((a,b)=>b.fav-a.fav);

    list.innerHTML="";

    data.forEach(d=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <div class="card-header">
          <strong contenteditable="true" onblur="updateField(${d.id},'title',this.innerText)">
            ${d.title}
          </strong>
          <span class="fav ${d.fav?"active":""}" onclick="toggleFav(${d.id})">★</span>
        </div>

        <div class="gallery">
          ${d.imgs.map(img=>`<img src="${img}" class="thumb" onclick="openModal('${img}')">`).join("")}
        </div>

        <div contenteditable="true" onblur="updateTags(${d.id},this.innerText)">
          ${d.tags.join(",")}
        </div>

        <div contenteditable="true" onblur="updateField(${d.id},'memo',this.innerText)">
          ${d.memo}
        </div>

        <div class="count">
          🍳${d.count}回 / ${d.last?new Date(d.last).toLocaleDateString():"-"}
        </div>

        <button onclick="cook(${d.id})">作った</button>
        <button onclick="del(${d.id})">削除</button>
      `;

      list.appendChild(div);
    });
  };
}

// ===== 更新 =====
function updateField(id,field,value){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const r=store.get(id);

  r.onsuccess=()=>{
    const d=r.result;
    d[field]=value;
    store.put(d);
  };
}

function updateTags(id,text){
  updateField(id,"tags",text.split(",").map(t=>t.trim()).filter(t=>t));
}

// ===== その他操作 =====
function cook(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const r=store.get(id);

  r.onsuccess=()=>{
    const d=r.result;
    d.count++;
    d.last=new Date().toISOString();
    store.put(d);
    render();
  };
}

function toggleFav(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  const r=store.get(id);

  r.onsuccess=()=>{
    const d=r.result;
    d.fav=!d.fav;
    store.put(d);
    render();
  };
}

function del(id){
  const tx=db.transaction("recipes","readwrite");
  const store=tx.objectStore("recipes");
  store.delete(id);
  tx.oncomplete=render;
}

// ===== モーダル =====
function openModal(src){
  modal.style.display="flex";
  modalImg.src=src;
}

function closeModal(){
  modal.style.display="none";
}
</script>

</body>
</html>
